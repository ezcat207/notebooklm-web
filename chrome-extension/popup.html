<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notebook and Batch</title>
  <style>
    body {
      width: 320px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      margin: 0;
    }

    h1 {
      font-size: 18px;
      margin: 0 0 12px 0;
      color: #1a1a1a;
    }

    .status {
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 12px;
      font-size: 14px;
    }

    .status.authenticated {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }

    .status.not-authenticated {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }

    .status.loading {
      background: #d1ecf1;
      color: #0c5460;
      border: 1px solid #bee5eb;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #4285f4;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
      margin-bottom: 8px;
    }

    button:hover {
      background: #357ae8;
    }

    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    .notebook-count {
      font-size: 14px;
      color: #666;
      margin-top: 8px;
    }

    .link {
      display: block;
      text-align: center;
      color: #4285f4;
      text-decoration: none;
      font-size: 14px;
      margin-top: 12px;
    }

    .link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <h1>Notebook and Batch</h1>

  <div id="status" class="status loading">
    正在检查认证状态...
  </div>

  <button id="checkAuth" disabled>检查认证</button>
  <button id="listNotebooks" disabled>列出笔记本</button>
  <button id="openWebApp">打开 Web 应用</button>
  <button id="exportLogs" style="background: #ea4335;">导出调试日志</button>
  <button id="copyLogs" style="background: #fbbc04; color: #000;">复制日志到剪贴板</button>

  <div id="notebookCount" class="notebook-count" style="display: none;"></div>

  <a href="#" id="loginLink" class="link" style="display: none;">
    在新标签页中打开 NotebookLM 登录
  </a>

  <script src="popup.js"></script>
</body>
</html>
